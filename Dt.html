<!DOCTYPE html>
<html>

<title>Player</title>

<body style="margin:0; background:#000;">

<iframe id="frame" width="100%" height="100%" style="border:none;"></iframe>

<script>
// leer parámetros
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const lang = params.get("lang") || "es";

// construir URL real
if(id){
  const url = "https://may.2f17ubowlsjn46easier.cfd/es/player.html?mdata=" + id + "&ilang=" + lang;
  document.getElementById("frame").src = url;
}else{
  alert("No hay ID");
}
</script>

</body>
</html>
