<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
}

/* iframe ocupa toda la pantalla */
iframe {
  width: 100%;
  height: 100vh;
  border: none;
}

/* botón fullscreen */
#fullscreenBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 999;
  padding: 12px 16px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  font-size: 16px;
  backdrop-filter: blur(5px);
}

/* ocultar botón cuando está en fullscreen */
:fullscreen #fullscreenBtn {
  display: none;
}
</style>
</head>

<body>

<iframe id="playerFrame"></iframe>

<!-- botón -->
<button id="fullscreenBtn">⛶ Pantalla completa</button>

<script>
// obtener parámetro
const params = new URLSearchParams(window.location.search);
const stream = params.get("stream");

// cargar el player
if(stream){
  document.getElementById("playerFrame").src =
    "https://streamtpnew.com/global1.php?stream=" + stream + "&useplayer";
}

// fullscreen
const btn = document.getElementById("fullscreenBtn");

btn.addEventListener("click", async () => {
  try {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
    }

    // intentar forzar horizontal
    if (screen.orientation && screen.orientation.lock) {
      await screen.orientation.lock("landscape");
    }

  } catch (err) {
    console.log("Error fullscreen:", err);
  }
});

// salir de fullscreen al tocar 2 veces (opcional)
let lastTap = 0;
document.addEventListener("touchend", function (e) {
  let currentTime = new Date().getTime();
  let tapLength = currentTime - lastTap;

  if (tapLength < 300 && tapLength > 0) {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    }
  }

  lastTap = currentTime;
});
</script>

</body>
</html>
