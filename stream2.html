<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>

<style>
body {
  margin: 0;
  background: #000;
}

iframe {
  width: 100%;
  height: 100vh;
  border: none;
}
</style>
</head>
<body>

<iframe id="playerFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const stream = params.get("stream");

// cargar el player real dentro del iframe
if(stream){
  document.getElementById("playerFrame").src =
    "https://streamtpnew.com/global1.php?stream=" + stream + "&useplayer";
}

// ⏪ regreso automático en 10 segundos

</script>
<script>
const iframe = document.getElementById("playerFrame");

// doble clic en toda la pantalla
document.body.addEventListener("dblclick", async () => {
  try {
    // activar pantalla completa
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
    }

    // forzar modo horizontal (si el navegador lo permite)
    if (screen.orientation && screen.orientation.lock) {
      await screen.orientation.lock("landscape");
    }

  } catch (err) {
    console.log("Error fullscreen:", err);
  }
});
</script>
</body>
</html>
