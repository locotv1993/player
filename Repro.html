<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Player</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Mensaje de carga */
#loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    background: black;
    z-index: 999;
}

iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: none;
}
</style>
</head>

<body>

<div id="loading">⏳ Cargando evento…</div>

<script>
// 🔥 OBTENER ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 🔥 BLOQUEO DE BOTÓN ATRÁS (ANTI-ANUNCIOS)
history.pushState(null, null, location.href);

window.onpopstate = function () {
    // 🔁 CAMBIA ESTA URL POR TU PÁGINA PRINCIPAL
    window.location.href = "https://TU-PAGINA-PRINCIPAL.com";
};

// 🔥 CARGAR STREAM
if (id) {
    const iframe = document.createElement("iframe");
    iframe.src = `https://streamx339.cloud/global1.php?channel=${encodeURIComponent(id)}`;
    iframe.allow = "autoplay; fullscreen";

    iframe.onload = () => {
        document.getElementById("loading").style.display = "none";
        iframe.style.display = "block";
    };

    document.body.appendChild(iframe);
} else {
    document.getElementById("loading").innerText = "❌ Evento no disponible";
}
</script>

</body>
</html>
